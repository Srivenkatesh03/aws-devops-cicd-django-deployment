events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone configuration (10 requests per second allowed per IP)
    limit_req_zone $binary_remote_addr zone=ddos_limit:10m rate=10r/s;

    upstream django_app {
        server web:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Hardened Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

        location / {
            # Apply rate limiting (allow bursts up to 20 requests)
            limit_req zone=ddos_limit burst=20 nodelay;

            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Serve Django static files directly through Nginx if mounted
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }
}
