version: "3.9"

services:
  web:
    image: srivenkatesh04/student-management-system:latest
    container_name: sms_web
    command: >
      sh -c "
      python wait_for_db.py &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn student_manager.wsgi:application \
      --bind 0.0.0.0:8000 \
      --workers 3 \
      --timeout 120
      "

    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: sms_db
    environment:
      POSTGRES_DB: student_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
