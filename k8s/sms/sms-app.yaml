apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-web
  namespace: sms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sms-web
  template:
    metadata:
      labels:
        app: sms-web
    spec:
      containers:
        - name: sms-web
          image: srivenkatesh04/student-management-system:latest
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: sms-config
            - secretRef:
                name: sms-db-secret

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5